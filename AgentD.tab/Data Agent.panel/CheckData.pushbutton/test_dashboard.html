
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Data Audit Dashboard</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg-color: #0f172a;
                --card-bg: rgba(30, 41, 59, 0.7);
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --accent: #38bdf8;
                --danger: #f43f5e;
                --success: #10b981;
            }
            body {
                margin: 0;
                padding: 2rem;
                font-family: 'Inter', sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
                background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
                min-height: 100vh;
            }
            .header {
                text-align: center;
                margin-bottom: 2rem;
            }
            .header h1 {
                font-weight: 800;
                font-size: 2.5rem;
                margin: 0;
                background: linear-gradient(to right, var(--accent), #818cf8);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .stats-container {
                display: flex;
                gap: 1.5rem;
                justify-content: center;
                margin-bottom: 2rem;
                flex-wrap: wrap;
            }
            .stat-card {
                background: var(--card-bg);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 1rem;
                padding: 1.5rem 2.5rem;
                text-align: center;
                min-width: 150px;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
                transition: transform 0.2s;
            }
            .stat-card:hover {
                transform: translateY(-5px);
            }
            .stat-card h3 {
                margin: 0 0 0.5rem 0;
                color: var(--text-muted);
                font-weight: 600;
                font-size: 1rem;
            }
            .stat-card .value {
                font-size: 2.5rem;
                font-weight: 800;
                margin: 0;
            }
            .stat-card.missing .value { color: var(--danger); }
            .stat-card.filled .value { color: var(--success); }
            
            .ai-card {
                background: rgba(56, 189, 248, 0.1);
                border: 1px solid rgba(56, 189, 248, 0.3);
                border-radius: 1rem;
                padding: 1.5rem 2.5rem;
                margin-bottom: 2rem;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
                max-width: 1200px;
                margin-left: auto;
                margin-right: auto;
            }
            .ai-card h3 {
                color: var(--accent);
                margin-top: 0;
            }
            .ai-card ul {
                margin: 0 0 1rem 0;
                padding-left: 1.5rem;
            }
            .ai-card li {
                margin-bottom: 0.5rem;
            }
            
            .charts-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
                gap: 2rem;
                max-width: 1200px;
                margin: 0 auto;
            }
            .chart-wrapper {
                background: var(--card-bg);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 1rem;
                padding: 1.5rem;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            }
            canvas {
                width: 100% !important;
                height: 300px !important;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>Data Audit Dashboard</h1>
            <p style="color: var(--text-muted)">Analysis of Target Parameter: <strong>Type Mark</strong></p>
        </div>
        
        <div class="stats-container">
            <div class="stat-card missing">
                <h3>Missing Data</h3>
                <p class="value">10</p>
            </div>
            <div class="stat-card filled">
                <h3>Filled Data</h3>
                <p class="value">5</p>
            </div>
        </div>

        <div class='ai-card'>test</div>

        <div class="charts-grid">
            <div class="chart-wrapper">
                <canvas id="overviewChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <canvas id="categoryChart"></canvas>
            </div>
            <div class="chart-wrapper" style="grid-column: 1 / -1;">
                <canvas id="familyChart"></canvas>
            </div>
        </div>

        <script>
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = 'Inter';
            
            new Chart(document.getElementById('overviewChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Missing', 'Filled'],
                    datasets: [{
                        data: [10, 5],
                        backgroundColor: ['#f43f5e', '#10b981'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        title: { display: true, text: 'Overall Completion', color: '#f8fafc', font: {size: 16} }
                    },
                    cutout: '70%'
                }
            });

            new Chart(document.getElementById('categoryChart'), {
                type: 'bar',
                data: {
                    labels: ["Doors", "Windows"],
                    datasets: [
                        { label: 'Missing', data: [5, 5], backgroundColor: '#f43f5e', borderRadius: 4 },
                        { label: 'Filled', data: [2, 3], backgroundColor: '#10b981', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: 'Data by Category', color: '#f8fafc', font: {size: 16} }
                    },
                    scales: {
                        x: { stacked: true, grid: {color: 'rgba(255,255,255,0.05)'} },
                        y: { stacked: true, grid: {color: 'rgba(255,255,255,0.05)'} }
                    }
                }
            });

            new Chart(document.getElementById('familyChart'), {
                type: 'bar',
                data: {
                    labels: ["Single-Flush", "Double-Hung"],
                    datasets: [
                        { label: 'Missing', data: [3, 2], backgroundColor: '#f43f5e', borderRadius: 4 },
                        { label: 'Filled', data: [1, 2], backgroundColor: '#10b981', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: 'Top Families (Most Missing Data)', color: '#f8fafc', font: {size: 16} }
                    },
                    scales: {
                        x: { stacked: true, grid: {color: 'rgba(255,255,255,0.05)'} },
                        y: { stacked: true, grid: {color: 'rgba(255,255,255,0.05)'} }
                    }
                }
            });
        </script>
    </body>
    </html>
